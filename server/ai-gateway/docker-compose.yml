services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform
      POSTGRES_DB: aiplatform
    volumes:
      - ../docker/init-dbs.sql:/docker-entrypoint-initdb.d/01-init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-platform
    restart: unless-stopped

  user-svc:
    build:
      context: ..
      dockerfile: user-svc/manifest/docker/Dockerfile
    environment:
      DB_HOST: postgres
      ASSET_SVC_ADDR: asset-svc:8101
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-platform
    restart: unless-stopped

  asset-svc:
    build:
      context: ..
      dockerfile: asset-svc/manifest/docker/Dockerfile
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-platform
    restart: unless-stopped

  ai-gateway:
    build:
      context: ..
      dockerfile: ai-gateway/manifest/docker/Dockerfile
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      USER_SVC_ADDR: user-svc:8100
      ASSET_SVC_ADDR: asset-svc:8101
    depends_on:
      - user-svc
      - asset-svc
    networks:
      - ai-platform
    restart: unless-stopped

networks:
  ai-platform:
    driver: bridge
