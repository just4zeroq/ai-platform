syntax = "proto3";

package user.v1;

option go_package = "api/user/v1;userv1";

// === Messages ===

message User {
  int64 id = 1;
  int64 tenant_id = 2;
  string username = 3;
  string email = 4;
  string phone = 5;
  string display_name = 6;
  string avatar = 7;
  int32 status = 8;
  int32 role = 9;
  string group = 10;
  string source = 11;
  string remark = 12;
  string created_at = 13;
  string updated_at = 14;
}

message Tenant {
  int64 id = 1;
  string name = 2;
  int32 status = 3;
}

message ApiKey {
  int64 id = 1;
  int64 user_id = 2;
  string key = 3;
  string name = 4;
  int32 status = 5;
  bool model_limits_enabled = 6;
  string model_limits = 7;
  int64 expire_time = 8;
  string allow_ips = 9;
  string group = 10;
  int64 last_used_at = 11;
  string created_at = 12;
}

message Role {
  int32 id = 1;
  string name = 2;
  string description = 3;
}

message Permission {
  int32 id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
}

// === Requests / Responses ===

message RegisterReq {
  string username = 1;
  string password = 2;
  string email = 3;
  string phone = 4;
  string source = 5;
  string oauth_id = 6;
}

message RegisterRes {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message LoginReq {
  string username = 1;
  string password = 2;
}

message LoginRes {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message ValidateTokenReq {
  string token = 1;
}

message ValidateTokenRes {
  int64 user_id = 1;
  int32 user_status = 2;
  string group = 3;
  bool has_token = 4;
  int64 api_key_id = 5;
  bool model_limits_enabled = 6;
  repeated string model_limits = 7;
  string key_group = 8;
  bool key_unlimited_quota = 9;
  int64 key_remain_quota = 10;
  int32 user_role = 11;
  int64 tenant_id = 12;
}

message CreateApiKeyReq {
  int64 user_id = 1;
  string name = 2;
  string model_limits = 3;
  bool model_limits_enabled = 4;
  int64 expire_time = 5;
  string allow_ips = 6;
  string group = 7;
}

message CreateApiKeyRes {
  ApiKey api_key = 1;
  string raw_key = 2;
}

message ListApiKeysReq {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListApiKeysRes {
  repeated ApiKey api_keys = 1;
  int32 total = 2;
}

message DeleteApiKeyReq {
  int64 id = 1;
  int64 user_id = 2;
}

message DeleteApiKeyRes {}

message GetUserReq {
  int64 user_id = 1;
}

message GetUserRes {
  User user = 1;
}

message ListUsersReq {
  int32 page = 1;
  int32 page_size = 2;
  int32 status = 3;
  string group = 4;
  string keyword = 5;
}

message ListUsersRes {
  repeated User users = 1;
  int32 total = 2;
}

message UpdateUserReq {
  int64 user_id = 1;
  int32 status = 2;
  string group = 3;
  int32 role = 4;
  string remark = 5;
}

message UpdateUserRes {
  User user = 1;
}

message UpdateApiKeyReq {
  int64 id = 1;
  int32 status = 2;
  string group = 3;
  string model_limits = 4;
  bool model_limits_enabled = 5;
}

message UpdateApiKeyRes {
  ApiKey api_key = 1;
}

// === Service ===

service UserService {
  rpc Register(RegisterReq) returns (RegisterRes);
  rpc Login(LoginReq) returns (LoginRes);
  rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenRes);
  rpc CreateApiKey(CreateApiKeyReq) returns (CreateApiKeyRes);
  rpc ListApiKeys(ListApiKeysReq) returns (ListApiKeysRes);
  rpc DeleteApiKey(DeleteApiKeyReq) returns (DeleteApiKeyRes);
  rpc GetUser(GetUserReq) returns (GetUserRes);
  rpc ListUsers(ListUsersReq) returns (ListUsersRes);
  rpc UpdateUser(UpdateUserReq) returns (UpdateUserRes);
  rpc UpdateApiKey(UpdateApiKeyReq) returns (UpdateApiKeyRes);
}
