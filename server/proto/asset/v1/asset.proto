syntax = "proto3";

package asset.v1;

option go_package = "ai-platform/api/asset/v1;assetv1";

message Product {
  int64 id = 1;
  int64 tenant_id = 2;
  string type = 3;
  string name = 4;
  string description = 5;
  string provider = 6;
  int64 provider_user_id = 7;
  double price = 8;
  string model_name = 9;
  string status = 10;
  int32 stock = 11;
  int32 sold_count = 12;
}

message Order {
  int64 id = 1;
  string order_no = 2;
  int64 user_id = 3;
  string type = 4;
  string status = 5;
  double total_amount = 6;
  string payment_method = 7;
  string payment_trade_no = 8;
  string paid_at = 9;
}

message Balance {
  int64 user_id = 1;
  double balance = 2;
  double total_recharged = 3;
  double total_consumed = 4;
}

message Transaction {
  int64 id = 1;
  int64 user_id = 2;
  string type = 3;
  double amount = 4;
  double balance_before = 5;
  double balance_after = 6;
  string reference_type = 7;
  int64 reference_id = 8;
  string remark = 9;
}

message UsageRecord {
  int64 id = 1;
  int64 user_id = 2;
  int64 api_key_id = 3;
  string model_name = 4;
  int32 prompt_tokens = 5;
  int32 completion_tokens = 6;
  double quota = 7;
  string request_id = 8;
}

message CreateOrderReq {
  int64 user_id = 1;
  string type = 2;
  double amount = 3;
  string payment_method = 4;
}

message CreateOrderRes {
  Order order = 1;
  string pay_url = 2;
}

message GetBalanceReq {
  int64 user_id = 1;
}

message GetBalanceRes {
  Balance balance = 1;
}

message ReportUsageReq {
  int64 user_id = 1;
  int64 api_key_id = 2;
  string model_name = 3;
  int32 prompt_tokens = 4;
  int32 completion_tokens = 5;
  double quota = 6;
  string request_id = 7;
  int64 channel_id = 8;
  string channel_name = 9;
}

message ReportUsageRes {
  double balance_after = 1;
}

message ListTransactionsReq {
  int64 user_id = 1;
  int32 page = 2;
  int32 page_size = 3;
}

message ListTransactionsRes {
  repeated Transaction transactions = 1;
  int32 total = 2;
}

service AssetService {
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderRes);
  rpc GetBalance(GetBalanceReq) returns (GetBalanceRes);
  rpc ReportUsage(ReportUsageReq) returns (ReportUsageRes);
  rpc ListTransactions(ListTransactionsReq) returns (ListTransactionsRes);
}
