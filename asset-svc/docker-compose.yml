services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiplatform
      POSTGRES_PASSWORD: aiplatform
      POSTGRES_DB: aiplatform
    volumes:
      - ../docker/init-dbs.sql:/docker-entrypoint-initdb.d/01-init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiplatform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ai-platform
    restart: unless-stopped

  asset-svc:
    build:
      context: ..
      dockerfile: docker/Dockerfile.asset-svc
    ports:
      - "8101:8101"
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-platform
    restart: unless-stopped

networks:
  ai-platform:
    driver: bridge
